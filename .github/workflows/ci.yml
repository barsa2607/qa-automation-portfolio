name: QA Automation CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    name: Run API Tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: |
          newman run postman-api-automation/collections/APITestCollection.json
